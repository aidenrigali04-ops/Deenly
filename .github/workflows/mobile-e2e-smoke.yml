name: mobile-e2e-smoke

on:
  workflow_dispatch:
    inputs:
      mobile_e2e_api_base_url:
        description: "API base URL (e.g. https://api.example.com/api/v1)"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mobile smoke flow
        run: npm run test:e2e:smoke
        env:
          MOBILE_E2E_API_BASE_URL: ${{ inputs.mobile_e2e_api_base_url }}
