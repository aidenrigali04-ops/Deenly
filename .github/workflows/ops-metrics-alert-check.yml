name: ops-metrics-alert-check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  metrics-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Debug ops metrics env presence
        run: |
          if [ -n "${OPS_METRICS_URL}" ]; then
            echo "OPS_METRICS_URL: set"
          else
            echo "OPS_METRICS_URL: not set"
          fi

          if [ -n "${OPS_METRICS_BEARER_TOKEN}" ]; then
            echo "OPS_METRICS_BEARER_TOKEN: set"
          else
            echo "OPS_METRICS_BEARER_TOKEN: not set"
          fi

          if [ -n "${OPS_METRICS_LOGIN_EMAIL}" ]; then
            echo "OPS_METRICS_LOGIN_EMAIL: set"
          else
            echo "OPS_METRICS_LOGIN_EMAIL: not set"
          fi

          if [ -n "${OPS_METRICS_LOGIN_PASSWORD}" ]; then
            echo "OPS_METRICS_LOGIN_PASSWORD: set"
          else
            echo "OPS_METRICS_LOGIN_PASSWORD: not set"
          fi
        env:
          OPS_METRICS_URL: ${{ secrets.OPS_METRICS_URL || vars.OPS_METRICS_URL }}
          OPS_METRICS_BEARER_TOKEN: ${{ secrets.OPS_METRICS_BEARER_TOKEN || vars.OPS_METRICS_BEARER_TOKEN }}
          OPS_METRICS_LOGIN_EMAIL: ${{ secrets.OPS_METRICS_LOGIN_EMAIL }}
          OPS_METRICS_LOGIN_PASSWORD: ${{ secrets.OPS_METRICS_LOGIN_PASSWORD }}

      - name: Resolve runtime ops metrics token
        run: |
          if [ -n "${OPS_METRICS_LOGIN_EMAIL}" ] && [ -n "${OPS_METRICS_LOGIN_PASSWORD}" ]; then
            node -e "const fs=require('fs');(async()=>{const metricsUrl=process.env.OPS_METRICS_URL;const email=process.env.OPS_METRICS_LOGIN_EMAIL;const password=process.env.OPS_METRICS_LOGIN_PASSWORD;if(!metricsUrl||!email||!password){return;}const url=new URL(metricsUrl);const authUrl=url.protocol+'//'+url.host+'/api/v1/auth/login';const response=await fetch(authUrl,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email,password})});if(!response.ok){const body=await response.text();throw new Error('Auth request failed ('+response.status+'): '+body);}const payload=await response.json();const token=payload&&payload.tokens&&payload.tokens.accessToken;if(!token){throw new Error('Login response missing tokens.accessToken');}fs.appendFileSync(process.env.GITHUB_ENV,'OPS_METRICS_RUNTIME_TOKEN='+token+'\n');console.log('Resolved runtime ops metrics token via login.');})().catch((error)=>{console.error(error.message||String(error));process.exit(1);});"
          else
            echo "OPS_METRICS_LOGIN_EMAIL/PASSWORD not set; falling back to static bearer token."
          fi
        env:
          OPS_METRICS_URL: ${{ secrets.OPS_METRICS_URL || vars.OPS_METRICS_URL }}
          OPS_METRICS_LOGIN_EMAIL: ${{ secrets.OPS_METRICS_LOGIN_EMAIL }}
          OPS_METRICS_LOGIN_PASSWORD: ${{ secrets.OPS_METRICS_LOGIN_PASSWORD }}

      - name: Run strict ops metrics check
        run: |
          TOKEN="${OPS_METRICS_RUNTIME_TOKEN:-${OPS_METRICS_BEARER_TOKEN}}"
          if [ -z "${TOKEN}" ]; then
            echo "No ops metrics bearer token available."
            exit 1
          fi
          OPS_METRICS_BEARER_TOKEN="${TOKEN}" npm run ops:check-metrics
        env:
          OPS_METRICS_URL: ${{ secrets.OPS_METRICS_URL || vars.OPS_METRICS_URL }}
          OPS_METRICS_BEARER_TOKEN: ${{ secrets.OPS_METRICS_BEARER_TOKEN || vars.OPS_METRICS_BEARER_TOKEN }}
          OPS_METRICS_STRICT: true
          # Default 1500 ms; tighten with repo variable OPS_METRICS_P95_MAX_MS (e.g. 700) when SLO allows.
          OPS_METRICS_P95_MAX_MS: ${{ vars.OPS_METRICS_P95_MAX_MS || '1500' }}
