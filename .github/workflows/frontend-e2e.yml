name: frontend-e2e

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deenly_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deenly_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run backend migrations
        working-directory: backend
        run: npm run migrate:up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deenly_e2e
          NODE_ENV: test
          DB_SSL_MODE: disable

      - name: Build frontend app
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000/api/v1

      - name: Start backend
        working-directory: backend
        run: npm start &
        env:
          PORT: 4000
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/deenly_e2e
          DB_SSL_MODE: disable
          CORS_ORIGINS: http://127.0.0.1:3001,http://localhost:3001
          JWT_ACCESS_SECRET: e2e-access-secret
          JWT_REFRESH_SECRET: e2e-refresh-secret
          MEDIA_PROVIDER: mock
          MOCK_UPLOAD_BASE_URL: http://127.0.0.1:4000
          TRUST_PROXY: false

      - name: Start frontend
        working-directory: frontend
        run: npm run start -- -p 3001 &
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:4000/api/v1

      - name: Wait for services
        run: |
          npx wait-on http://127.0.0.1:4000/health
          npx wait-on http://127.0.0.1:3001/feed

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:3001
          BACKEND_API_URL: http://127.0.0.1:4000/api/v1
