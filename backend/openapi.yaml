openapi: 3.0.3
info:
  title: Deenly Backend API
  version: 1.0.0
  description: Stable v1 contract for frontend integration.
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        requestId:
          type: string
    Event:
      type: object
      description: Public event surface (subset of fields may be null when disabled by feature flags).
      properties:
        id: { type: integer }
        hostUserId: { type: integer }
        hostDisplayName: { type: string, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time, nullable: true }
        timezone: { type: string }
        isOnline: { type: boolean }
        onlineUrl: { type: string, nullable: true }
        addressDisplay: { type: string, nullable: true }
        latitude: { type: number, nullable: true }
        longitude: { type: number, nullable: true }
        visibility: { type: string, enum: [public, private, invite] }
        capacity: { type: integer, nullable: true }
        status: { type: string, enum: [scheduled, canceled, completed] }
        rsvpInterestedCount: { type: integer }
        rsvpGoingCount: { type: integer }
        viewerRsvpStatus: { type: string, enum: [interested, going], nullable: true }
        canJoinChat: { type: boolean }
        distanceM: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        viewerInvited: { type: boolean, description: Present on GET detail when the authenticated user has an in-app invite row. }
        viewedWithInviteLink: { type: boolean, description: Present on GET detail when access was granted via a valid invite link token. }
paths:
  /auth/register:
    post:
      summary: Register user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password, displayName]
              properties:
                email: { type: string, format: email }
                username: { type: string, example: abdullah_01 }
                password: { type: string, minLength: 8 }
                displayName: { type: string }
      responses:
        "201":
          description: Registered
  /auth/login:
    post:
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Logged in
  /auth/session/me:
    get:
      summary: Get authenticated session user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
  /users:
    get:
      summary: List users (stable profile surface)
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: User list
  /users/me:
    get:
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
    put:
      summary: Update current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated profile
    delete:
      summary: Close account (anonymize profile; standard users only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm:
                  type: string
                  enum: [DELETE]
      responses:
        "204":
          description: Account closed
        "400":
          description: Missing or invalid confirm
        "403":
          description: Staff accounts must use operations process
  /users/me/data-export:
    get:
      summary: Download a JSON snapshot of account-held personal data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Export payload (user, profile, posts, purchases)
  /users/{userId}:
    get:
      summary: Get user profile by id
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: User profile
  /profiles:
    get:
      deprecated: true
      summary: Deprecated alias for users list
      responses:
        "200":
          description: Profile list
  /posts:
    post:
      summary: Create post
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Post created
    get:
      summary: List posts
      parameters:
        - in: query
          name: postType
          schema:
            type: string
            enum: [post, marketplace, reel]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: authorId
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Post list
  /posts/{postId}:
    get:
      summary: Get post by id with metrics
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Post details
  /feed:
    get:
      summary: Get ranked feed items (cursor pagination)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: postType
          schema:
            type: string
            enum: [post, marketplace, reel]
        - in: query
          name: feedTab
          schema:
            type: string
            enum: [for_you, marketplace, reels]
        - in: query
          name: followingOnly
          schema: { type: boolean }
        - in: query
          name: authorId
          schema: { type: integer }
        - in: query
          name: minCreatedAt
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Feed list
  /interactions:
    post:
      summary: Add interaction (benefited, reflect_later, comment)
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Interaction stored
  /interactions/view:
    post:
      summary: Track post view metrics
      security:
        - bearerAuth: []
      responses:
        "201":
          description: View event stored
  /interactions/post/{postId}:
    get:
      summary: Get interaction totals for a post
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Interaction totals
  /reports:
    post:
      summary: Submit moderation report
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Report created
  /media/upload-signature:
    post:
      summary: Generate signed media upload URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaType, mimeType, originalFilename, fileSizeBytes]
              properties:
                mediaType:
                  type: string
                  enum: [image, video]
                mimeType:
                  type: string
                  example: image/jpeg
                originalFilename:
                  type: string
                fileSizeBytes:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Signed upload data
        "400":
          description: Invalid media upload request
  /media/posts/{postId}/attach:
    post:
      summary: Attach raw uploaded media to post
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaKey, mimeType, fileSizeBytes]
              properties:
                mediaKey:
                  type: string
                mediaUrl:
                  type: string
                mimeType:
                  type: string
                  example: video/mp4
                fileSizeBytes:
                  type: integer
                  minimum: 1
                durationSeconds:
                  type: number
                  minimum: 0.001
      responses:
        "200":
          description: Media attached
        "400":
          description: Invalid media attach request
  /notifications:
    get:
      summary: List in-app notifications
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Notifications list
  /users/me/interests:
    get:
      summary: List current user interests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Interests list
    put:
      summary: Replace current user interests
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Interests updated
  /users/me/sessions:
    get:
      summary: List refresh sessions for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sessions list
  /admin/tables/{table}:
    get:
      summary: Admin table viewer endpoint
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: table
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Table rows
  /creator/analytics/overview:
    get:
      summary: Creator analytics overview (views, engagement, purchases, earnings)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: creatorUserId
          schema: { type: integer }
          description: Optional; defaults to caller. Moderators may query other creators.
      responses:
        "200":
          description: Overview aggregates
  /creator/analytics/conversion:
    get:
      summary: Creator funnel metrics (views, clicks, purchases, CTR)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: creatorUserId
          schema: { type: integer }
      responses:
        "200":
          description: Conversion metrics
  /creator/analytics/seller-boosts/summary:
    get:
      summary: Seller boost purchase and impression summary
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: creatorUserId
          schema: { type: integer }
      responses:
        "200":
          description: Boost summary DTO
  /creator/analytics/seller-boosts:
    get:
      summary: List seller boost purchases for a creator
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: creatorUserId
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: offset
          schema: { type: integer }
      responses:
        "200":
          description: Paginated boost purchases
  /creator/analytics/seller-boosts/{purchaseId}:
    get:
      summary: Seller boost purchase detail with per-post impressions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: purchaseId
          required: true
          schema: { type: integer }
        - in: query
          name: creatorUserId
          schema: { type: integer }
      responses:
        "200":
          description: Purchase and targets
        "404":
          description: Not found
  /admin/rewards/ledger-entries:
    get:
      summary: Inspect reward ledger (ADMIN_OWNER_EMAIL + moderator/admin role)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ledger list with filters
  /admin/rewards/ledger-entries/{id}:
    get:
      summary: Reward ledger entry detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Entry and optional reversal-of
  /admin/rewards/referrals/queue:
    get:
      summary: Referral attribution queue for ops review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Queue items
  /admin/rewards/referrals/attributions/{id}:
    get:
      summary: Referral attribution detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Attribution with referral code
  /admin/rewards/referrals/attributions/{id}/review:
    post:
      summary: Mark reviewed or reject pending referral attribution
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [mark_reviewed, reject] }
                reason: { type: string }
                notes: { type: string }
      responses:
        "200":
          description: Updated attribution
  /admin/rewards/fraud-flags:
    get:
      summary: Heuristic rewards/referral fraud flags for manual review
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Flag list and applied thresholds
  /admin/rewards/redemptions:
    get:
      summary: List checkout reward redemptions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Redemption rows
  /monetization/admin/rewards/ledger-entries:
    get:
      summary: Inspect reward ledger (moderator/admin team mirror)
      description: Same contract as GET /admin/rewards/ledger-entries. Use when the caller is moderator/admin but not ADMIN_OWNER_EMAIL. All paths under /monetization/admin/rewards/ mirror /admin/rewards/.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ledger list with filters
  /monetization/admin/rewards/fraud-flags:
    get:
      summary: Fraud flags (moderator/admin team mirror)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Flag list and applied thresholds
  /messages/conversations:
    get:
      summary: List conversations for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversation list
    post:
      summary: Create or find direct conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participantUserId]
              properties:
                participantUserId: { type: integer }
      responses:
        "201":
          description: Conversation created
        "200":
          description: Conversation already exists
  /messages/conversations/{conversationId}/messages:
    get:
      summary: List messages for a conversation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: integer }
        - in: query
          name: beforeId
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Message list
    post:
      summary: Send a message in conversation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
      responses:
        "201":
          description: Message sent
  /messages/conversations/{conversationId}/read:
    post:
      summary: Mark conversation messages as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: conversationId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Read marker updated
  /search/users:
    get:
      summary: Search users by display name or username
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: User search results
  /search/posts:
    get:
      summary: Search posts by content
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: postType
          schema:
            type: string
            enum: [post, marketplace, reel]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Post search results
  /events/near:
    get:
      summary: List events near a point (discovery)
      description: Returns 404 when events feature or read path is disabled via env.
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lng
          required: true
          schema: { type: number }
        - in: query
          name: radiusM
          schema: { type: integer, minimum: 100, maximum: 100000 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: timeWindow
          schema:
            type: string
            enum: [upcoming, today, this_week]
      responses:
        "200":
          description: Events near the given coordinates
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
        "404":
          description: Events not enabled
  /events:
    get:
      summary: List events (filters vary by query params)
      description: Returns 404 when events feature or read path is disabled. Optional hostUserId returns events hosted by that user (visibility rules apply).
      parameters:
        - in: query
          name: hostUserId
          schema: { type: integer }
          description: When set, only events with this host user id (still filtered by viewer access).
        - in: query
          name: limit
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0, minimum: 0 }
        - in: query
          name: source
          schema: { type: string, maxLength: 64 }
          description: Analytics surface hint (e.g. web_profile).
      responses:
        "200":
          description: Event list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
    post:
      summary: Create event (host)
      security:
        - bearerAuth: []
      description: Returns 404 when events feature or create path is disabled.
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
  /events/{id}:
    get:
      summary: Get event by id
      description: Returns 404 when not found or not visible to caller. Optional inviteToken grants access to private/invite-only events when the link is valid.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: source
          schema: { type: string, maxLength: 64 }
          description: Analytics surface hint.
        - in: query
          name: inviteToken
          schema: { type: string, maxLength: 200 }
          description: Plaintext invite token from a host-generated link; omit when not using a share link.
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      summary: Update event (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
  /events/{id}/rsvp:
    post:
      summary: Set RSVP status for current user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [interested, going, none] }
                source: { type: string, maxLength: 64 }
                inviteToken: { type: string, maxLength: 200, description: Same token as GET /events/{id} when opening from an invite link. }
      responses:
        "200":
          description: RSVP updated
  /events/{id}/rsvp/me:
    get:
      summary: Get current user RSVP for event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: inviteToken
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: RSVP state
  /events/{id}/chat:
    get:
      summary: List event chat messages
      security:
        - bearerAuth: []
      description: Returns 404 when event chat is disabled. Requires Going RSVP; inviteToken matches loadEventAccess when the user opened the event via a valid link.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100 }
        - in: query
          name: beforeId
          schema: { type: integer }
        - in: query
          name: inviteToken
          schema: { type: string, maxLength: 200 }
      responses:
        "200":
          description: Chat messages page
    post:
      summary: Post event chat message
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 4000 }
                source: { type: string, maxLength: 64 }
                inviteToken: { type: string, maxLength: 200 }
      responses:
        "201":
          description: Message created
  /events/{id}/invite-links:
    get:
      summary: List invite links for an event (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Link rows without raw tokens
    post:
      summary: Create a new invite link (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                expiresInDays: { type: integer, minimum: 1, maximum: 365 }
      responses:
        "201":
          description: inviteToken returned once in the response body
  /events/{id}/invite-links/{linkId}:
    delete:
      summary: Revoke an invite link (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: linkId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Revoked
  /events/{id}/invites/users:
    post:
      summary: Send in-app invites to users (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items: { type: integer }
                  maxItems: 50
      responses:
        "200":
          description: Counts of invites created
  /events/{id}/attendees:
    get:
      summary: RSVPs and pending in-app invites (host)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: rsvps and pendingInvites arrays
  /ads/boost-catalog:
    get:
      summary: List preset boost packages (suggested budgets and caps)
      responses:
        "200":
          description: Catalog items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /ads/campaigns:
    post:
      summary: Create a draft ad campaign for a post or event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                postId: { type: integer }
                eventId: { type: integer }
                packageId: { type: string }
                budgetMinor: { type: integer }
                dailyCapImpressions: { type: integer }
      responses:
        "201":
          description: Campaign created
        "429":
          description: Too many requests (per-user rate limit)
  /ads/campaigns/me:
    get:
      summary: List current user ad campaigns with review status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Campaign rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /ads/campaigns/me/analytics-summary:
    get:
      summary: Aggregate impressions and clicks across the user campaigns
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Summary counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaignCount: { type: integer }
                  activeCampaigns: { type: integer }
                  impressions: { type: integer }
                  clicks: { type: integer }
  /ads/campaigns/{id}/boost-checkout:
    post:
      summary: Start Stripe Checkout to fund boost budget (owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                returnClient:
                  type: string
                  enum: [web, mobile_app, app]
                  description: web (default) uses APP_BASE_URL return pages; mobile_app uses the native deenly:// deep link back into the app after Checkout
      responses:
        "200":
          description: Checkout session
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string }
                  sessionId: { type: string }
        "400":
          description: Invalid returnClient
        "409":
          description: Already funded or invalid state
        "429":
          description: Too many requests (per-user rate limit)
